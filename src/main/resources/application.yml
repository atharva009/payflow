spring:
  application:
    name: payflow

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/payments
    username: ${DB_USER:payments}
    password: ${DB_PASS:payments}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: PaymentHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20
    open-in-view: false   # MUST be false — prevents hidden lazy-load bugs

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    oauth2:
      resourceserver:
        jwt:
          jws-algorithms: HS256
          secret-key: ${JWT_SECRET}   # minimum 32 chars for HS256

logging:
  level:
    com.payments: INFO
    org.springframework.batch: INFO
