spring:
  application:
    name: payflow

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/payments
    username: ${DB_USER:payments}
    password: ${DB_PASS:payments}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: PaymentHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        default_batch_fetch_size: 20
    open-in-view: false   # MUST be false — prevents hidden lazy-load bugs

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      lettuce:
        pool:
          max-active: 10
          min-idle: 2
          max-idle: 5

  security:
    oauth2:
      resourceserver:
        jwt:
          jws-algorithms: HS256
          secret-key: ${JWT_SECRET}   # minimum 32 chars for HS256

resilience4j:
  retry:
    instances:
      processor:
        max-attempts: 3
        wait-duration: 500ms
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.payments.exception.TransientProcessorException
        ignore-exceptions:
          - com.payments.exception.PermanentProcessorException

  circuit-breaker:
    instances:
      processor:
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 2s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

  timeout:
    instances:
      processor:
        timeout-duration: 5s

mock-processor:
  success-rate: 0.85
  transient-failure-rate: 0.10
  permanent-failure-rate: 0.03
  timeout-rate: 0.02
  min-latency-ms: 50
  max-latency-ms: 200

logging:
  level:
    com.payments: INFO
    org.springframework.batch: INFO
